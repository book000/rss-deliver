name: Update RSS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 * * * *'

jobs:
  update-rss:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        id: pnpm-install
        with:
          run_install: false

      - name: 📂 Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: 📂 Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          xargs -a .github/apt-packages.txt sudo apt-get install -y

      - name: 👨🏻‍💻 Install dependencies
        run: |
          pnpm install --frozen-lockfile --prefer-frozen-lockfile

      - name: 🖼️ Restore popute image cache
        uses: actions/cache/restore@v5
        with:
          path: output/popute
          key: popute-images-${{ github.run_id }}
          restore-keys: |
            popute-images-

      - name: 📦 Restore article cache
        uses: actions/cache/restore@v5
        with:
          path: .article-cache
          key: article-cache-${{ github.run_id }}
          restore-keys: |
            article-cache-

      - name: Update RSS
        id: update-rss
        run: pnpm start

      - name: 🖼️ Save popute image cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: output/popute
          key: popute-images-${{ github.run_id }}

      - name: 💾 Save article cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: .article-cache
          key: article-cache-${{ github.run_id }}

      - name: Error handling
        if: failure()
        uses: Ilshidur/action-discord@0.4.0
        with:
          args: ''
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_EMBEDS: |
            [
              {
                "title": "RSS Update Failed",
                "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "color": 16711680
              }
            ]

      - name: Upload Pages-artifact
        uses: actions/upload-pages-artifact@v4
        if: always()
        with:
          path: output

  deploy:
    runs-on: ubuntu-latest
    needs: update-rss
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
